<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>关于我</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .card {
      background: #fff;
      border-radius: 16px;
      padding: 48px 40px;
      max-width: 560px;
      width: 100%;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.2);
    }

    .avatar {
      width: 72px;
      height: 72px;
      margin: 0 auto 20px;
      border-radius: 50%;
      background: linear-gradient(135deg, #667eea, #764ba2);
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-size: 2rem;
      font-weight: 600;
    }

    h1 {
      color: #333;
      font-size: 1.8rem;
      margin-bottom: 12px;
      text-align: center;
    }

    .subtitle {
      color: #888;
      font-size: 0.95rem;
      text-align: center;
      margin-bottom: 28px;
    }

    p {
      color: #666;
      font-size: 1.05rem;
      line-height: 1.7;
      margin-bottom: 20px;
    }

    .section {
      margin-bottom: 24px;
    }

    .section h2 {
      color: #444;
      font-size: 1rem;
      margin-bottom: 10px;
      padding-left: 10px;
      border-left: 3px solid #667eea;
    }

    .tags {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .tag {
      padding: 6px 14px;
      background: #f0f2ff;
      color: #667eea;
      border-radius: 16px;
      font-size: 0.85rem;
    }

    .actions {
      text-align: center;
      margin-top: 32px;
    }

    .link {
      display: inline-block;
      padding: 10px 24px;
      background: #667eea;
      color: #fff;
      text-decoration: none;
      border-radius: 20px;
      font-size: 0.95rem;
      transition: background 0.2s;
    }

    .link:hover {
      background: #5a6fd6;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="avatar">G</div>
    <h1>关于这个 Git 学习项目</h1>
    <p class="subtitle">HTML · Git · GitHub 协作练习</p>

    <div class="section">
      <h2>项目简介</h2>
      <p>这是我在功能分支上开发的第二个 HTML 页面，用来练习 Git 分支开发、合并 main 以及 push 到远程仓库的完整流程。</p>
    </div>

    <div class="section">
      <h2>正在学习的内容</h2>
      <div class="tags">
        <span class="tag">分支开发</span>
        <span class="tag">合并 main</span>
        <span class="tag">解决冲突</span>
        <span class="tag">Pull Request</span>
        <span class="tag">GitHub Push</span>
      </div>
    </div>

    <div class="actions">
      <a class="link" href="index.html">返回首页</a>
    </div>
  </div>
</body>
</html>
