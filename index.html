<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>我的第一个 Git 页面</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .card {
      background: #fff;
      border-radius: 16px;
      padding: 48px 40px;
      max-width: 520px;
      width: 100%;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.2);
      text-align: center;
    }

    h1 {
      color: #333;
      font-size: 1.8rem;
      margin-bottom: 20px;
    }

    p {
      color: #666;
      font-size: 1.05rem;
      line-height: 1.7;
    }

    .badge {
      display: inline-block;
      margin-top: 28px;
      padding: 8px 20px;
      background: #667eea;
      color: #fff;
      border-radius: 20px;
      font-size: 0.85rem;
    }

    .nav-link {
      display: inline-block;
      margin-top: 20px;
      padding: 10px 24px;
      background: #667eea;
      color: #fff;
      text-decoration: none;
      border-radius: 20px;
      font-size: 0.95rem;
      transition: background 0.2s;
    }

    .nav-link:hover {
      background: #5a6fd6;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>我的第一个 Git 页面</h1>
    <p>这是我用 Cursor 创建并上传到 GitHub 的第一个 HTML 页面</p>
    <span class="badge">Git 学习项目</span>
    <br>
    <a class="nav-link" href="about.html">关于页面</a>
  </div>
</body>
</html>
