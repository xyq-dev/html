<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>联系我们</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .card {
      background: #fff;
      border-radius: 16px;
      padding: 48px 40px;
      max-width: 520px;
      width: 100%;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.2);
      text-align: center;
    }

    h1 {
      color: #333;
      font-size: 1.8rem;
      margin-bottom: 20px;
    }

    p {
      color: #666;
      font-size: 1.05rem;
      line-height: 1.7;
      margin-bottom: 24px;
    }

    .contact-info {
      text-align: left;
      background: #f8f9ff;
      border-radius: 12px;
      padding: 20px 24px;
      margin-bottom: 28px;
    }

    .contact-info li {
      color: #555;
      font-size: 1rem;
      line-height: 2;
      list-style: none;
    }

    .contact-info li::before {
      content: "• ";
      color: #667eea;
      font-weight: bold;
    }

    .link {
      display: inline-block;
      padding: 10px 24px;
      background: #667eea;
      color: #fff;
      text-decoration: none;
      border-radius: 20px;
      font-size: 0.95rem;
      transition: background 0.2s;
    }

    .link:hover {
      background: #5a6fd6;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>联系我们</h1>
    <p>这是我在功能分支中新增的联系我们页面，用来继续学习 Git 分支开发流程。</p>
    <ul class="contact-info">
      <li>邮箱：example@example.com</li>
      <li>GitHub：xyq-dev</li>
    </ul>
    <a class="link" href="index.html">返回首页</a>
  </div>
</body>
</html>
